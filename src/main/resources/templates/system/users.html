<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="fragments/layout :: sidebar"></aside>
    <main class="main">
        <header th:replace="fragments/layout :: topbar"></header>
        <section class="content">
            <div class="panel-header">
                <div>
                    <h1 class="page-title">Users</h1>
                    <p class="page-subtitle">Create accounts, assign roles, and manage account status.</p>
                </div>
                <a class="button" th:href="@{/system/users/new}">New user</a>
            </div>
            <div class="message" th:if="${success}" th:text="${success}"></div>
            <form class="panel filters" th:action="@{/system/users}" method="get">
                <input name="keyword" th:value="${keyword}" placeholder="Username, display name, or email">
                <select name="roleKey">
                    <option value="">All roles</option>
                    <option value="admin" th:selected="${roleKey == 'admin'}">Admin</option>
                    <option value="teacher" th:selected="${roleKey == 'teacher'}">Teacher</option>
                    <option value="student" th:selected="${roleKey == 'student'}">Student</option>
                </select>
                <button class="button" type="submit">Search</button>
                <a class="button secondary" th:href="@{/system/users}">Reset</a>
            </form>
            <div class="table-wrap">
                <table class="table">
                    <thead>
                    <tr><th>ID</th><th>Username</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Email</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.userId}">1</td>
                        <td th:text="${user.userName}">user</td>
                        <td th:text="${user.nickName}">Name</td>
                        <td th:text="${user.email}">email</td>
                        <td th:text="${#strings.listJoin(user.roles.![roleKey], ', ')}">role</td>
                        <td><span class="badge" th:text="${user.status == '0' ? 'Active' : 'Disabled'}">Active</span></td>
                        <td><span class="badge" th:text="${user.emailActivated == '0' ? 'Pending' : 'Activated'}">Activated</span></td>
                        <td><a class="button small secondary" th:href="@{/system/users/{id}/edit(id=${user.userId})}">Edit</a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
