<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="fragments/layout :: sidebar"></aside>
    <main class="main">
        <header th:replace="fragments/layout :: topbar"></header>
        <section class="content">
            <h1 class="page-title">Admin Dashboard</h1>
            <p class="page-subtitle">Manage users, master data, topics, applications, and reports.</p>
            <div class="grid">
                <a class="stat" th:href="@{/system/users}"><span>User administration</span><strong>RBAC</strong></a>
                <a class="stat" th:href="@{/project/categories}"><span>Topic taxonomy</span><strong>Categories</strong></a>
                <a class="stat" th:href="@{/project/reports}"><span>Operational overview</span><strong>Reports</strong></a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
