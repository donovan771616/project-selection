<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create account - Project Hub</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-panel">
    <h1>Create account</h1>
    <p>Only student and teacher accounts can self-register.</p>
    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <div class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
        <div class="form-row">
            <label for="roleKey">Role</label>
            <select id="roleKey" th:field="*{roleKey}" required>
                <option value="">Select a role</option>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('roleKey')}" th:errors="*{roleKey}"></div>
        </div>
        <div class="form-row">
            <label for="userName">Username</label>
            <input id="userName" th:field="*{userName}" required>
            <div class="error" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></div>
        </div>
        <div class="form-row">
            <label for="nickName">Display name</label>
            <input id="nickName" th:field="*{nickName}" required>
            <div class="error" th:if="${#fields.hasErrors('nickName')}" th:errors="*{nickName}"></div>
        </div>
        <div class="form-row">
            <label for="email">Email</label>
            <input id="email" th:field="*{email}" type="email" required>
            <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="form-row">
            <label for="password">Password</label>
            <input id="password" th:field="*{password}" type="password" required>
            <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div class="actions">
            <button class="button" type="submit">Create account</button>
            <a class="button secondary" th:href="@{/login}">Back to sign in</a>
        </div>
    </form>
</main>
</body>
</html>
