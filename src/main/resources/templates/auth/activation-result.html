<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Activation result - Project Selection</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-panel">
    <h1>Activation failed</h1>
    <p th:text="${error}">Activation link is invalid.</p>
    <div class="actions">
        <a class="button" th:href="@{/activation/resend}">Resend activation email</a>
        <a class="button secondary" th:href="@{/login}">Back to sign in</a>
    </div>
</main>
</body>
</html>
