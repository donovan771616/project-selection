<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resend Activation Code - Project Selection</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        .auth-panel h1 {
            margin: 0 0 12px;
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
        }
        
        .auth-panel > p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }
        
        .email-info-box {
            background: linear-gradient(135deg, var(--blue-soft) 0%, rgba(124, 58, 237, 0.04) 100%);
            border: 1px solid rgba(37, 99, 235, 0.18);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .email-info-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: block;
        }
        
        .email-info-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-dark);
            word-break: break-all;
            line-height: 1.5;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .actions .button {
            flex: 1;
        }
        
        @media (max-width: 480px) {
            .auth-panel {
                padding: 28px 24px;
            }
            
            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="auth-page">
<main class="auth-panel">
    <h1>Resend Activation Code</h1>
    <p>Your email has not been activated yet. We can send you a new activation link.</p>
    
    <div class="message" th:if="${hasResend}">Verification code has been sent to your registered email. Please check and complete activation.</div>
    <div class="error" th:if="${hasResendError and message}" th:text="${message}"></div>
    <div class="error" th:if="${hasError}" th:text="${error}"></div>
    
    <form th:action="@{/activation/resend}" method="post" id="resendForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input name="source" type="hidden" value="activation-resend">
        <input name="email" type="hidden" th:value="${email}">
        
        <div class="email-info-box">
            <label class="email-info-label">Registered Email</label>
            <div class="email-info-value" th:text="${email}">email@example.com</div>
        </div>
        
        <div class="actions">
            <button class="button" type="submit" id="resendBtn">Resend Activation Link</button>
            <a class="button secondary" th:href="@{/login}">Back to sign in</a>
        </div>
    </form>
</main>

<script>
(function() {
    const resendBtn = document.getElementById('resendBtn');
    const resendForm = document.getElementById('resendForm');
    
    if (resendBtn && resendForm) {
        let countdown = 60;
        let timer = null;
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('resend')) {
            startCountdown();
        }
        
        resendForm.addEventListener('submit', function(e) {
            startCountdown();
        });
        
        function startCountdown() {
            resendBtn.disabled = true;
            resendBtn.textContent = 'Resend available in ' + countdown + 's';
            resendBtn.style.opacity = '0.6';
            resendBtn.style.cursor = 'not-allowed';
            
            timer = setInterval(function() {
                countdown--;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'Resend Verification Code';
                    resendBtn.style.opacity = '1';
                    resendBtn.style.cursor = 'pointer';
                    countdown = 60;
                } else {
                    resendBtn.textContent = 'Resend available in ' + countdown + 's';
                }
            }, 1000);
        }
    }
})();
</script>
</body>
</html>
