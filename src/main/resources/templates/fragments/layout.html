<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside th:fragment="sidebar" class="sidebar">
    <div class="brand"><span>CP</span>Project Hub</div>
    <nav class="nav">
        <a th:href="@{/index}">Dashboard</a>
        <a th:href="@{/system/users}" sec:authorize="hasRole('ADMIN')">Users</a>
        <a th:href="@{/project/topics}" sec:authorize="hasAnyRole('STUDENT','TEACHER','ADMIN')">Topics</a>
        <a th:href="@{/project/applications}" sec:authorize="hasAnyRole('STUDENT','TEACHER','ADMIN')">Applications</a>
        <a th:href="@{/project/categories}" sec:authorize="hasRole('ADMIN')">Categories</a>
        <a th:href="@{/project/reports}" sec:authorize="hasRole('ADMIN')">Reports</a>
        <a th:href="@{/profile}">Profile</a>
    </nav>
</aside>

<header th:fragment="topbar" class="topbar">
    <div class="user-chip">
        <strong th:text="${loginUser != null ? loginUser.nickName : 'User'}">User</strong>
        <span th:text="${loginUser != null ? loginUser.primaryRole() : ''}">role</span>
    </div>
    <form th:action="@{/logout}" method="post">
        <button class="button danger" type="submit">Sign out</button>
    </form>
</header>
</body>
</html>
