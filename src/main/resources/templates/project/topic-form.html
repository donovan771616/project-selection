<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Topic Form</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="fragments/layout :: sidebar"></aside>
    <main class="main">
        <header th:replace="fragments/layout :: topbar"></header>
        <section class="content">
            <h1 class="page-title" th:text="${topicForm.topicId == null ? 'Create Topic' : 'Edit Topic'}">Topic Form</h1>
            <p class="page-subtitle">Draft topics can be published once the required fields are complete.</p>
            <div class="panel">
                <form th:object="${topicForm}"
                      th:action="${topicForm.topicId == null ? '/project/topics' : '/project/topics/' + topicForm.topicId + '/edit'}"
                      method="post">
                    <div class="form-grid">
                        <div class="form-row wide">
                            <label for="title">Title</label>
                            <input id="title" th:field="*{title}" required>
                            <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>
                        <div class="form-row wide">
                            <label for="description">Description</label>
                            <textarea id="description" th:field="*{description}" required></textarea>
                            <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>
                        <div class="form-row">
                            <label for="categoryId">Category</label>
                            <select id="categoryId" th:field="*{categoryId}" required>
                                <option value="">Select category</option>
                                <option th:each="category : ${categories}" th:value="${category.categoryId}" th:text="${category.categoryName}"></option>
                            </select>
                        </div>
                        <div class="form-row">
                            <label for="maxStudents">Max students</label>
                            <input id="maxStudents" th:field="*{maxStudents}" type="number" min="1" required>
                        </div>
                        <div class="form-row">
                            <label for="skills">Required skills</label>
                            <input id="skills" th:field="*{skills}">
                        </div>
                        <div class="form-row">
                            <label for="keywords">Keywords</label>
                            <input id="keywords" th:field="*{keywords}">
                        </div>
                    </div>
                    <div class="actions">
                        <button class="button" type="submit">Save</button>
                        <a class="button secondary" th:href="@{/project/topics}">Cancel</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
