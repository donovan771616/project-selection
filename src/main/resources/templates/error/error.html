<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${status + ' - ' + title}">Error</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="fragments/layout :: sidebar"></aside>
    <main class="main">
        <header th:replace="fragments/layout :: topbar"></header>
        <section class="content error-page">
            <div class="error-card">
                <div class="error-code" th:text="${status}">500</div>
                <h1 class="page-title" th:text="${title}">Something went wrong</h1>
                <p class="page-subtitle" th:text="${message}">The system encountered an unexpected problem.</p>
                <p class="error-path" th:if="${path}" th:text="|Request path: ${path}|">Request path</p>
                <div class="error-actions">
                    <a class="button" th:href="@{/index}">Back to dashboard</a>
                    <a class="button secondary" href="javascript:history.back()">Go back</a>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
